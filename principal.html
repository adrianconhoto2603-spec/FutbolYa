<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>FútbolYa</title>
  <link rel="stylesheet" href="principal.css">
</head>
<body>
  <header>
    <h1>FútbolYa</h1>
    <nav>
      <!-- Aquí podrías tener enlaces a otras secciones como Registro/Login -->
      <a href="index.html">Inicio</a>
      <a href="registro.html">Registro</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Publicar un Partido</h2>
      <!-- Formulario para crear partido -->
      <form id="formPartido">
        <input type="text" id="nombrePartido" placeholder="Nombre del partido" required>
        <input type="date" id="fecha" required>
        <input type="time" id="hora" required>
        <input type="text" id="lugar" placeholder="Lugar" required>
        <input type="number" id="jugadores" placeholder="Cantidad de jugadores" required>
        <button type="submit">Publicar partido</button>
      </form>
    </section>

    <section>
      <h2>Próximos Partidos</h2>
      <!-- Contenedor donde se renderizan los partidos -->
      <div id="listaPartidos"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 FútbolYa - Plataforma de integración estudiantil</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
