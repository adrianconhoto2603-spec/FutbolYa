<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - FútbolYA</title>
  <link rel="stylesheet" href="registro.css">
</head>
<body>
  <main>
    <div class="form-section">
      <h2>Registro</h2>
      <form id="formRegistro">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="celular" placeholder="Celular" required>
        <input type="password" id="passwordReg" placeholder="Contraseña" required>
        <button type="submit">Registrarse</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('formRegistro').addEventListener('submit', (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const celular = document.getElementById('celular').value;
      const password = document.getElementById('passwordReg').value;

      let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
      const usuarioExistente = usuarios.find(u => u.email === email);

      if (usuarioExistente) {
        alert('Este email ya está registrado. Iniciá sesión.');
        window.location.href = "login.html";
        return;
      }

      usuarios.push({ nombre, email, celular, password });
      localStorage.setItem('usuarios', JSON.stringify(usuarios));
      alert('Registro exitoso. Ahora podés iniciar sesión.');
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
