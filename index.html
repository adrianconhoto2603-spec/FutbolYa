<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - FútbolYA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <h1>Registrate en FútbolYA</h1>
  </section>

  <main>
    <div class="form-section">
      <form id="formRegistro">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" required>
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <label for="celular">Celular:</label>
        <input type="text" id="celular" required>
        <label for="passwordReg">Contraseña:</label>
        <input type="password" id="passwordReg" required>
        <button type="submit">Registrarse</button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('formRegistro').addEventListener('submit', (e) => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const celular = document.getElementById('celular').value;
      const password = document.getElementById('passwordReg').value;

      let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
      if (usuarios.find(u => u.email === email)) {
        alert('Este email ya está registrado.');
        return;
      }

      usuarios.push({ nombre, email, celular, password });
      localStorage.setItem('usuarios', JSON.stringify(usuarios));
      alert('Registro exitoso. Ahora podés iniciar sesión.');
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
