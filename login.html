<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - FútbolYA</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main>
    <div class="form-section">
      <h2>Iniciar Sesión</h2>
      <form id="formLogin">
        <input type="email" id="emailLogin" placeholder="Email" required>
        <input type="password" id="passwordLogin" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
      </form>
      <p>¿No tenés cuenta? <a href="index.html">Registrate aquí</a></p>
    </div>
  </main>

  <script>
    document.getElementById('formLogin').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('emailLogin').value;
      const password = document.getElementById('passwordLogin').value;

      let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
      const usuario = usuarios.find(u => u.email === email && u.password === password);

      if (!usuario) {
        alert('Email o contraseña incorrectos.');
        return;
      }

      localStorage.setItem('usuarioActivo', JSON.stringify(usuario));
      alert(`Bienvenido, ${usuario.nombre}`);
      window.location.href = "principal.html";
    });
  </script>
</body>
</html>
